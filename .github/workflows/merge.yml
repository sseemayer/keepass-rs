---
name: CI on Master

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: run cargo test
        run: cargo test --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get Nix version
        id: nix-version
        run: echo "version=$(cat .nix-version)" >> $GITHUB_OUTPUT
      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          install_url: https://releases.nixos.org/nix/nix-${{ steps.nix-version.outputs.version }}/install
      - name: Generate code coverage
        run: |
          nix develop --command cargo tarpaulin --verbose --timeout 120
      - name: Upload code coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  get-next-version:
    name: Get the next version
    runs-on: ubuntu-latest
    outputs:
      version : ${{ steps.semantic-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: paulhatch/semantic-version@f29500c9d60a99ed5168e39ee367e0976884c46e # v6.0.1
        id: semantic-version
        with:
          tag_prefix: "v"
          major_pattern: "/breaking change:/"
          major_regexp_flags: "ig"
          minor_pattern: "/^feat:/"
          minor_regexp_flags: "ig"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true
          enable_prerelease_mode: true

  release:
    name: Publish a new release
    needs:
      - get-next-version
      - test
      - coverage
    permissions:
      contents: write # required to push the new git tag
      id-token: write # required for trusted publishing
    runs-on: ubuntu-latest
    env:
      next-version: ${{ needs.get-next-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Print the next version
        run: |
          echo "The next version is ${{ env.next-version }}"

      - name: Patch the Cargo version
        run: |
          sed -i 's/0.0.0-placeholder-version/${{ env.next-version }}/' Cargo.toml
          git diff

      - name: Get Nix version
        id: nix-version
        run: echo "version=$(cat .nix-version)" >> $GITHUB_OUTPUT
      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          install_url: https://releases.nixos.org/nix/nix-${{ steps.nix-version.outputs.version }}/install

      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Publish new Cargo version
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          nix develop --command cargo publish --allow-dirty

      - name: Tag the next version
        run: |
          new_tag_name="v${{ env.next-version }}"
          git tag "$new_tag_name" "${{ github.sha }}"
          git push origin "$new_tag_name"
